name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AltHMinimize.slnx

      - name: Build
        run: dotnet build AltHMinimize.slnx -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test AltHMinimize.slnx -c Release --no-build

      - name: Format check
        run: dotnet format AltHMinimize.slnx --verify-no-changes --no-restore
