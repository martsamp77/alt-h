name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Package release
        shell: pwsh
        run: ./scripts/package-release.ps1 -Version $env:GITHUB_REF_NAME

      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $files = Get-ChildItem "artifacts/release/$tag" -File | ForEach-Object { $_.FullName }
          gh release create $tag @files --draft --generate-notes
